<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troya Doğal Ürünler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-section">
        <h2 class="section-title">Çok Satanlar</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="image-container">
                    <span class="discount-badge">-%15</span>
                    <img src="https://via.placeholder.com/300x250/fdfbf7/6d3a3a?text=Suzme+Cicek+Bali" alt="Süzme Çiçek Balı">
                </div>
                <div class="product-info">
                    <div class="price-row">
                        <span class="current-price">250 TL</span>
                        <span class="old-price">295 TL</span>
                    </div>
                    <h3 class="product-title">Süzme Çiçek Balı</h3>
                    <p class="product-desc">Katkısız, doğal süzme çiçek balı.</p>
                    <p class="shipping-promo">1.000 TL Siparişinize Kargo Bedava</p>
                    <a href="#" class="add-to-cart">Sepete Ekle</a>
                </div>
            </div>

            <div class="product-card">
                <div class="image-container">
                    <span class="discount-badge">-%18</span>
                    <img src="https://via.placeholder.com/300x250/fdfbf7/6d3a3a?text=Soguk+Sikim+Zeytinyagi" alt="Soğuk Sıkım Zeytinyağı">
                </div>
                <div class="product-info">
                    <div class="price-row">
                        <span class="current-price">350 TL</span>
                        <span class="old-price">425 TL</span>
                    </div>
                    <h3 class="product-title">Soğuk Sıkım Zeytinyağı</h3>
                    <p class="product-desc">Erken hasat, soğuk sıkım natürel sızma.</p>
                    <p class="shipping-promo">1.000 TL Siparişinize Kargo Bedava</p>
                    <a href="#" class="add-to-cart">Sepete Ekle</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
