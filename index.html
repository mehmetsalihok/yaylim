<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troya Doğal Ürünler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Troya Doğal Ürünler</h1>
        <p>Doğadan sofranıza, en saf haliyle.</p>
    </header>

    <main class="product-grid">
        
        <div class="product-card">
            <img src="https://via.placeholder.com/300x250?text=Suzme+Bal" alt="Troya Süzme Bal">
            <h2>Süzme Çiçek Balı</h2>
            <p>Katkısız, doğal süzme çiçek balı.</p>
            <p class="price">250 TL</p>
            
            <div class="shopier-btn-alani">
                <button class="gecici-buton">Sepete Ekle</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300x250?text=Zeytinyagi" alt="Troya Zeytinyağı">
            <h2>Soğuk Sıkım Zeytinyağı</h2>
            <p>Erken hasat, soğuk sıkım natürel sızma.</p>
            <p class="price">350 TL</p>
            
            <div class="shopier-btn-alani">
                 <button class="gecici-buton">Sepete Ekle</button>
            </div>
        </div>

    </main>

    <script src="https://s3.eu-central-1.amazonaws.com/shopier/static/js/embed.js"></script>
</body>
</html>
